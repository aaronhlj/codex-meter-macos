name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: Run tests
        run: swift test
      - name: Build release binary
        run: swift build -c release --product CodexUsageApp
