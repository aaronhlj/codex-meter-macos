name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        default: v1.0.1

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
      - name: Build app
        run: ./scripts/build-app.sh
      - name: Package app
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          archive="dist/Codex-Meter-macOS-arm64-${version}.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/Codex Meter.app" "$archive"
          shasum -a 256 "$archive" | tee dist/SHA256SUMS.txt
      - name: Write release notes
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          ## 中文

          此版本移除了本地会话文件读取。Codex Meter 现在仅通过 Codex 实时服务获取 5 小时和 7 天额度数据。

          下载 ZIP，解压后将应用移入“应用程序”文件夹。首次运行可能需要右键应用并选择“打开”。

          ## English

          This release removes local session file access. Codex Meter now obtains 5-hour and 7-day usage data exclusively from the Codex real-time service.

          Download the ZIP, extract it, and move the app to Applications. On first launch, you may need to right-click the app and choose **Open**.
          NOTES
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            dist/Codex-Meter-macOS-arm64-*.zip \
            dist/SHA256SUMS.txt \
            --verify-tag \
            --title "Codex Meter ${{ inputs.tag }}" \
            --notes-file /tmp/release-notes.md
