name: Feature request / 功能建议
description: Suggest an improvement / 提议改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case / 问题或使用场景
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / 其他方案
